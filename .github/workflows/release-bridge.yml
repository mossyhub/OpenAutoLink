name: Release Bridge

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-bridge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Install cross-compilation toolchain
        run: |
          # Add ARM64 architecture
          sudo dpkg --add-architecture arm64

          # GitHub runners (Ubuntu 24.04) use DEB822 format in /etc/apt/sources.list.d/ubuntu.sources
          # Default sources only serve amd64. We need to:
          # 1. Restrict existing sources to amd64 only
          # 2. Add ports.ubuntu.com for arm64 packages
          
          # Handle DEB822 format (.sources files) — add arch restriction
          for f in /etc/apt/sources.list.d/*.sources; do
            if [ -f "$f" ] && ! grep -q "^Architectures:" "$f"; then
              sudo sed -i '/^Types:/a Architectures: amd64' "$f"
            fi
          done
          
          # Handle traditional format (.list files) — add [arch=amd64]
          for f in /etc/apt/sources.list /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i 's/^deb \([^[]\)/deb [arch=amd64] \1/' "$f" 2>/dev/null || true
          done

          # Add ports.ubuntu.com for arm64
          cat << 'EOF' | sudo tee /etc/apt/sources.list.d/arm64-ports.list > /dev/null
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-updates main restricted universe multiverse
          deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports noble-security main restricted universe multiverse
          EOF

          sudo apt-get update
          # Relay binary has zero library deps — just needs the cross-compiler
          sudo apt-get install -y \
            g++-14-aarch64-linux-gnu \
            gcc-14-aarch64-linux-gnu \
            cmake make

      - name: Cross-compile relay for ARM64
        run: |
          cat > /tmp/aarch64-toolchain.cmake << 'EOF'
          set(CMAKE_SYSTEM_NAME Linux)
          set(CMAKE_SYSTEM_PROCESSOR aarch64)
          set(CMAKE_C_COMPILER aarch64-linux-gnu-gcc-14)
          set(CMAKE_CXX_COMPILER aarch64-linux-gnu-g++-14)
          set(CMAKE_FIND_ROOT_PATH /usr/aarch64-linux-gnu /usr)
          set(CMAKE_FIND_ROOT_PATH_MODE_PROGRAM NEVER)
          set(CMAKE_FIND_ROOT_PATH_MODE_LIBRARY ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_INCLUDE ONLY)
          set(CMAKE_FIND_ROOT_PATH_MODE_PACKAGE ONLY)
          EOF

          mkdir -p build-bridge
          cd build-bridge

          cmake ../bridge/openautolink/relay \
            -DCMAKE_TOOLCHAIN_FILE=/tmp/aarch64-toolchain.cmake \
            -DCMAKE_BUILD_TYPE=Release

          cmake --build . --target openautolink-relay -j$(nproc)
          aarch64-linux-gnu-strip openautolink-relay

      - name: Upload relay binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: build-bridge/openautolink-relay
